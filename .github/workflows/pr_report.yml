# .github/workflows/pr_report.yml
name: Generate PR Report

on:
  pull_request:
    types: [opened, closed]

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests oci python-docx

      - name: Create config.py
        run: |
          cat > config.py << 'EOF'
          OCI_COMPARTMENT_ID  = "${{ secrets.OCI_COMPARTMENT_ID }}"
          OCI_ENDPOINT        = "${{ secrets.OCI_ENDPOINT }}"
          OCI_MODEL_ID        = "${{ secrets.OCI_MODEL_ID }}"
          OUTPUT_FILE         = "pr_report.docx"
          EOF

      - name: Run PR Agent
        env:
          OCI_USER:         ${{ secrets.OCI_USER }}
          OCI_FINGERPRINT:  ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY:      ${{ secrets.OCI_TENANCY }}
          OCI_REGION:       ${{ secrets.OCI_REGION }}
          OCI_KEY_CONTENT:  ${{ secrets.OCI_KEY_CONTENT }}
        run: |
          python - << 'EOF'
          import github_client
          import oci_client
          import doc_generator

          repo  = "${{ github.repository }}"
          token = "${{ secrets.GITHUB_TOKEN }}"

          print(f"Fetching PRs from {repo}...")
          pr_data = github_client.get_all_pr_data(
              repo=repo, state="all", max_count=10, token=token
          )

          if not pr_data:
              print("No PRs found.")
              exit(0)

          analysis = oci_client.analyze_pull_requests(pr_data)
          doc_generator.generate(pr_data, analysis, repo, "pr_report.docx")
          print("Done!")
          EOF

      - name: Commit report to repo
        run: |
          git config user.name  "PR Agent Bot"
          git config user.email "pr-agent@github-actions"
          git add -f pr_report.docx
          git diff --staged --quiet || git commit -m "📄 Auto-update PR report [$(date +'%Y-%m-%d %H:%M')]"
          git pull origin master --rebase
          git push origin HEAD:master